<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>3D Rubik’s Cube — Generate &amp; Solve (Animated)</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="wrap">
  <header>
    <h1>3D Rubik’s Cube — Generate & Solve</h1>
    <div class="actions">
      <button id="btn-generate" title="Scramble the cube">Generate</button>
      <button id="btn-solve" title="Solve by inverting the scramble">Solve</button>
      <button id="btn-reset" title="Reset to solved state">Reset</button>
      <label class="speed">
        Speed
        <select id="speed">
          <option value="280">Normal</option>
          <option value="180" selected>Fast</option>
          <option value="120">Faster</option>
        </select>
      </label>
    </div>
  </header>

  <main>
    <div id="stage" aria-label="3D Rubik's cube canvas"></div>
  </main>

  <pre id="log" class="log" aria-label="Move log">Booting…</pre>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
