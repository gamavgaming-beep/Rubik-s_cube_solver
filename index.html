<!doctype html>
<html lang="ta">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Cube Solver Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>3D Cube Solver Pro</h1>
        <p>Manual color input → Solve → Next click move-by-move 3D animation</p>
      </div>
      <div class="top-actions">
        <button id="demoBtn">Demo</button>
        <button id="resetBtn">Reset</button>
        <button id="solveBtn" class="primary">Solve</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel editor-panel">
        <div class="panel-head">
          <h2>Manual Color Input</h2>
          <span>Tap stickers to change</span>
        </div>

        <div id="faces" class="faces"></div>
        <div class="legend" id="legend"></div>

        <div class="solver-box">
          <label for="moveInput">Move input</label>
          <textarea id="moveInput" placeholder="Example: R U R' U' F2"></textarea>
          <div class="row">
            <button id="useMovesBtn">Use Moves</button>
            <button id="scrambleBtn">Scramble</button>
          </div>
        </div>

        <div class="status">
          <div>Mode: <b id="modeText">Ready</b></div>
          <div>Step: <b id="stepText">0</b></div>
          <div>Total: <b id="totalText">0</b></div>
        </div>

        <div class="progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="move-strip" id="moveStrip"></div>
      </section>

      <section class="panel viewer-panel">
        <div class="panel-head">
          <h2>3D Preview</h2>
          <span>Frame-by-frame rotation</span>
        </div>

        <div class="viewer">
          <div id="cubeStage" class="cube-stage">
            <div id="cube" class="cube"></div>
          </div>
        </div>

        <div class="controls">
          <button id="prevBtn">Previous</button>
          <button id="nextBtn" class="primary">Next</button>
          <button id="autoBtn" class="good">Auto Play</button>
        </div>

        <div class="hint">
          Next click செய்தா அடுத்த solver move மட்டும் rotate ஆகும்.
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
